<!-- @dsCard group="Spacing" viewport="700x180" name="Radius Scale" subtitle="From subtle chips to full pills" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-base);display:flex;gap:18px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .b{width:84px;height:84px;background:var(--surface-card);border:1px solid var(--border-strong);border-top:3px solid var(--accent)}
  .l{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="col"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="l">sm · 10</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-md)"></div><div class="l">md · 14</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="l">lg · 20</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-xl)"></div><div class="l">xl · 28</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-pill)"></div><div class="l">pill · 999</div></div>
</body></html>
