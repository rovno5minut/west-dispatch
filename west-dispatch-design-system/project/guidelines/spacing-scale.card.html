<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base rhythm" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-base);display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--grad-accent);border-radius:4px;width:30px}
  .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="col"><div class="bar" style="height:8px"></div><div class="l">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="l">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="l">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="l">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="l">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="l">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="l">64</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="l">96</div></div>
</body></html>
