<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-base);display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:150px;border-radius:var(--radius-md);padding:16px;display:flex;flex-direction:column;justify-content:flex-end;height:120px;border:1px solid var(--border-subtle)}
  .n{font-family:var(--font-display);font-weight:700;color:#fff;font-size:15px}
  .h{font-family:var(--font-mono);font-size:12px;color:rgba(255,255,255,.75);margin-top:3px}
</style></head><body>
  <div class="sw" style="background:var(--grad-accent)"><div class="n">Primary / Blue 500</div><div class="h">#2E6BFF · --accent</div></div>
  <div class="sw" style="background:var(--wd-blue-400)"><div class="n">Blue 400</div><div class="h">#4D8DFF · hover</div></div>
  <div class="sw" style="background:var(--grad-energy)"><div class="n">Energy / Crimson</div><div class="h">#F0294A · --energy</div></div>
</body></html>
