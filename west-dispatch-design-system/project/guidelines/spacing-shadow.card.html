<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & Shadow" subtitle="Restrained shadows + accent glow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px;background:var(--bg-base);display:flex;gap:24px;flex-wrap:wrap;align-items:center}
  .b{width:130px;height:90px;border-radius:var(--radius-lg);background:var(--surface-card);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:12px}
  .l{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="b" style="box-shadow:var(--shadow-md),var(--sheen-top)"><span class="l">md</span></div>
  <div class="b" style="box-shadow:var(--shadow-lg),var(--sheen-top)"><span class="l">lg</span></div>
  <div class="b" style="box-shadow:var(--shadow-accent);border-color:rgba(46,107,255,.3)"><span class="l">accent glow</span></div>
  <div class="b" style="box-shadow:var(--shadow-energy);border-color:rgba(240,41,74,.3)"><span class="l">energy glow</span></div>
</body></html>
