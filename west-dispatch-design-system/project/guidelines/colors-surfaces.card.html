<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces — Navy Scale" subtitle="Deep slate-navy elevation ramp" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-base);display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:96px;border-radius:var(--radius-sm);padding:12px;display:flex;flex-direction:column;justify-content:flex-end;height:120px;border:1px solid var(--border-subtle)}
  .n{font-family:var(--font-body);font-weight:700;color:var(--text-strong);font-size:13px}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:3px}
</style></head><body>
  <div class="sw" style="background:var(--wd-navy-900)"><div class="n">Deep</div><div class="h">#070B12</div></div>
  <div class="sw" style="background:var(--wd-navy-800)"><div class="n">Base</div><div class="h">#0D1420</div></div>
  <div class="sw" style="background:var(--wd-navy-700)"><div class="n">Raised</div><div class="h">#152032</div></div>
  <div class="sw" style="background:var(--wd-navy-600)"><div class="n">Card</div><div class="h">#1B2A40</div></div>
  <div class="sw" style="background:var(--wd-navy-500)"><div class="n">Hover</div><div class="h">#243650</div></div>
</body></html>
