<!-- @dsCard group="Brand" viewport="700x200" name="Backgrounds & Eyebrow" subtitle="Hero gradient + mono eyebrow motif" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--bg-base)}
  .hero{height:200px;background:var(--grad-hero);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 30px}
  .grid{position:absolute;inset:0;background-image:linear-gradient(var(--border-subtle) 1px,transparent 1px),linear-gradient(90deg,var(--border-subtle) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(120% 90% at 80% 0%,#000,transparent 70%);opacity:.7}
  .eye{position:relative;font-family:var(--font-mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .h{position:relative;font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:-.03em;color:var(--text-strong);margin-top:8px;max-width:460px;line-height:1.05}
</style></head><body>
  <div class="hero">
    <div class="grid"></div>
    <div class="eye">— Premium dispatch · radial navy gradient</div>
    <div class="h">Subtle blueprint grid, masked toward the corner.</div>
  </div>
</body></html>
