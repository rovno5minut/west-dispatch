<!-- @dsCard group="Colors" viewport="700x160" name="Text on Dark" subtitle="Four-step text hierarchy" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-base);display:flex;flex-direction:column;gap:10px}
  .r{display:flex;align-items:baseline;gap:14px}
  .t{font-family:var(--font-display);font-weight:700;font-size:24px}
  .c{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
</style></head><body>
  <div class="r"><span class="t" style="color:var(--text-strong)">Strong — headlines &amp; numbers</span><span class="c">--text-strong · #EEF3FA</span></div>
  <div class="r"><span class="t" style="color:var(--text-body)">Body — paragraphs &amp; UI</span><span class="c">--text-body · #AEBCD0</span></div>
  <div class="r"><span class="t" style="color:var(--text-muted)">Muted — captions &amp; meta</span><span class="c">--text-muted · #738096</span></div>
  <div class="r"><span class="t" style="color:var(--text-faint)">Faint — disabled</span><span class="c">--text-faint · #4A5670</span></div>
</body></html>
