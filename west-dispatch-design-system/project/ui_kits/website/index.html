<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>West Dispatch — Truck Dispatching</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="site.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx" data-presets="react"></script>
<script type="text/babel" src="Header.jsx" data-presets="react"></script>
<script type="text/babel" src="VideoHero.jsx" data-presets="react"></script>
<script type="text/babel" src="Hero.jsx" data-presets="react"></script>
<script type="text/babel" src="Services.jsx" data-presets="react"></script>
<script type="text/babel" src="Equipment.jsx" data-presets="react"></script>
<script type="text/babel" src="WhyChoose.jsx" data-presets="react"></script>
<script type="text/babel" src="HowItWorks.jsx" data-presets="react"></script>
<script type="text/babel" src="Testimonials.jsx" data-presets="react"></script>
<script type="text/babel" src="FAQ.jsx" data-presets="react"></script>
<script src="telegram-config.js" onerror="window.WD_ENV=window.WD_ENV||{}"></script>
<script type="text/babel" src="Contact.jsx" data-presets="react"></script>
<script type="text/babel" src="Footer.jsx" data-presets="react"></script>

<script type="text/babel" data-presets="react">
  function Site() {
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons({ attrs: { "stroke-width": 1.75 } }); }, []);
    const { Header, Hero, Services, WhyChoose, HowItWorks, Testimonials, FAQ, Contact, Footer } = window;
    const { Equipment, VideoHero } = window;
    return (
      <div className="wd-site">
        <Header />
        <VideoHero />
        <Hero />
        <Services />
        <Equipment />
        <WhyChoose />
        <HowItWorks />
        <Testimonials />
        <FAQ />
        <Contact />
        <Footer />
      </div>
    );
  }
  function boot() {
    if (!(window.Header && window.Hero && window.VideoHero && window.Footer && window.Contact)) { return setTimeout(boot, 40); }
    ReactDOM.createRoot(document.getElementById("root")).render(<Site />);
  }
  boot();
</script>
</body>
</html>
